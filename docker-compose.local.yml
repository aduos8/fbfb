services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      POSTGRES_URL: "${POSTGRES_URL}"
      CASSANDRA_CONTACT_POINTS: "${CASSANDRA_CONTACT_POINTS}"
      CASSANDRA_LOCAL_DC: "${CASSANDRA_LOCAL_DC}"
      CASSANDRA_KEYSPACE: "${CASSANDRA_KEYSPACE}"
      CASSANDRA_USERNAME: "${CASSANDRA_USERNAME}"
      CASSANDRA_PASSWORD: "${CASSANDRA_PASSWORD}"
      MEILISEARCH_URL: "${MEILISEARCH_URL}"
      MEILISEARCH_API_KEY: "${MEILISEARCH_API_KEY}"
      JWT_SECRET: "${JWT_SECRET}"
      PUBLIC_URL: "${PUBLIC_URL}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      STORAGE_BASE_URL: "${STORAGE_BASE_URL}"
      RUN_DB_MIGRATIONS: "true"
      RUN_CASSANDRA_INIT: "true"
      RUN_SEARCH_REINDEX_ON_BOOT: "false"
      BOOTSTRAP_MAX_RETRIES: "${BOOTSTRAP_MAX_RETRIES:-8}"
      BOOTSTRAP_RETRY_DELAY: "${BOOTSTRAP_RETRY_DELAY:-5}"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 1m
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-tgosint} -d ${POSTGRES_DB:-tgosint}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  cassandra:
    image: cassandra:4.1
    environment:
      CASSANDRA_CLUSTER_NAME: "${CASSANDRA_CLUSTER_NAME}"
      CASSANDRA_DC: "${CASSANDRA_DC}"
      CASSANDRA_RACK: "${CASSANDRA_RACK}"
      CASSANDRA_ENDPOINT_SNITCH: "${CASSANDRA_ENDPOINT_SNITCH:-GossipingPropertyFileSnitch}"
      MAX_HEAP_SIZE: "1G"
      HEAP_NEWSIZE: "256m"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD-SHELL", "nodetool status 2>/dev/null | grep -q UN || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 40
      start_period: 150s

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: "${MEILISEARCH_API_KEY}"
      MEILI_ENV: "production"
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health | grep -q '\"status\":\"available\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  postgres_data:
  cassandra_data:
  meilisearch_data: