services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    environment:
      PORT: "${PORT:-3000}"
      NODE_ENV: "production"
      POSTGRES_URL: "${POSTGRES_URL:?Set POSTGRES_URL}"
      CASSANDRA_CONTACT_POINTS: "${CASSANDRA_CONTACT_POINTS:-host.docker.internal}"
      CASSANDRA_LOCAL_DC: "${CASSANDRA_LOCAL_DC:-datacenter1}"
      CASSANDRA_KEYSPACE: "${CASSANDRA_KEYSPACE:-tgosint}"
      CASSANDRA_USERNAME: "${CASSANDRA_USERNAME:-}"
      CASSANDRA_PASSWORD: "${CASSANDRA_PASSWORD:-}"
      SEARCH_BACKEND: "${SEARCH_BACKEND:-opensearch}"
      OPENSEARCH_URL: "${OPENSEARCH_URL:-http://opensearch:9200}"
      OPENSEARCH_USERNAME: "${OPENSEARCH_USERNAME:-}"
      OPENSEARCH_PASSWORD: "${OPENSEARCH_PASSWORD:-}"
      MEILISEARCH_URL: "${MEILISEARCH_URL:-}"
      MEILISEARCH_API_KEY: "${MEILISEARCH_API_KEY:-}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET}"
      PUBLIC_URL: "${PUBLIC_URL:?Set PUBLIC_URL}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS}"
      STORAGE_BASE_URL: "${STORAGE_BASE_URL:?Set STORAGE_BASE_URL}"
      OXAPAY_MERCHANT_KEY: "${OXAPAY_MERCHANT_KEY:-}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID:-}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH:-}"
      TELEGRAM_SESSION: "${TELEGRAM_SESSION:-}"
      STORAGEBOX_SFTP_HOST: "${STORAGEBOX_SFTP_HOST:-}"
      STORAGEBOX_SFTP_USER: "${STORAGEBOX_SFTP_USER:-}"
      STORAGEBOX_SFTP_PASSWORD: "${STORAGEBOX_SFTP_PASSWORD:-}"
      RUN_DB_MIGRATIONS: "${RUN_DB_MIGRATIONS:-true}"
      RUN_CASSANDRA_INIT: "${RUN_CASSANDRA_INIT:-true}"
      RUN_SEARCH_CONFIGURE_ON_BOOT: "${RUN_SEARCH_CONFIGURE_ON_BOOT:-true}"
      RUN_SEARCH_REINDEX_ON_BOOT: "${RUN_SEARCH_REINDEX_ON_BOOT:-false}"
      BOOTSTRAP_MAX_RETRIES: "${BOOTSTRAP_MAX_RETRIES:-8}"
      BOOTSTRAP_RETRY_DELAY: "${BOOTSTRAP_RETRY_DELAY:-5}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    volumes:
      - /mnt/hetzner/media:/mnt/hetzner/media:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-tgosint}"
      POSTGRES_USER: "${POSTGRES_USER:-tgosint}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-tgosint} -d ${POSTGRES_DB:-tgosint}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  opensearch:
    image: opensearchproject/opensearch:2.19.5
    environment:
      discovery.type: "single-node"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ""
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -q '\"status\"'" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  postgres_data:
  opensearch_data:
