services:
  postgres:
    image: postgres:16-alpine
    container_name: tgosint-postgres
    environment:
      POSTGRES_DB: tgosint
      POSTGRES_USER: tgosint
      POSTGRES_PASSWORD: tgosint_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U tgosint -d tgosint"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - tgosint-net

  redis:
    image: redis:7-alpine
    container_name: tgosint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - tgosint-net

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: tgosint-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - tgosint-net

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  tgosint-net:
    name: tgosint-local-net
