services:
  postgres:
    image: postgres:16-alpine
    container_name: tgosint-postgres
    environment:
      POSTGRES_DB: tgosint
      POSTGRES_USER: tgosint
      POSTGRES_PASSWORD: tgosint_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U tgosint -d tgosint"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - tgosint-net

  redis:
    image: redis:7-alpine
    container_name: tgosint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - tgosint-net

  cassandra:
    image: cassandra:4.1
    container_name: tgosint-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: tgosint-local
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: "512m"
      HEAP_NEWSIZE: "128m"
    command: >
      sh -c "echo 'sasi_indexes_enabled: true' >> /etc/cassandra/cassandra.yaml
      && docker-entrypoint.sh cassandra -f"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD-SHELL", "nodetool status 2>/dev/null | grep -q UN || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 40
      start_period: 150s
    networks:
      - tgosint-net

volumes:
  postgres_data:
  redis_data:
  cassandra_data:

networks:
  tgosint-net:
    name: tgosint-local-net
